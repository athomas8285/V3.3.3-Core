<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>???? | V3.3.3-Core</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#1f2937;display:flex;min-height:100vh}
#sidebar{width:200px;min-width:200px;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;transition:width .2s,min-width .2s;overflow:hidden;z-index:10;box-shadow:1px 0 3px rgba(0,0,0,.04)}
#sidebar.collapsed{width:52px;min-width:52px}
.sidebar-header{padding:16px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sidebar-header h2{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden}
#collapse-btn{background:none;border:none;cursor:pointer;padding:4px;color:#9ca3af;flex-shrink:0}
#collapse-btn:hover{color:#4b5563}
#sidebar nav{flex:1;padding:8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;color:#6b7280;cursor:pointer;font-size:14px;border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s;white-space:nowrap}
.nav-item:hover{background:#f3f4f6;color:#1f2937}
.nav-item.active{background:#eff6ff;color:#2563eb;border-left:3px solid #2563eb;padding-left:9px}
.nav-item i{flex-shrink:0;width:20px;height:20px}
#sidebar.collapsed .nav-item{gap:0;justify-content:center;padding:10px}
#sidebar.collapsed .nav-item span{display:none}
#sidebar.collapsed .nav-item.active{border-left:none;padding-left:10px}
.sidebar-footer{padding:12px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af}
#sidebar.collapsed .sidebar-footer{display:none}
.sidebar-footer .time{font-size:11px}
main{flex:1;padding:24px 28px;min-width:0;background:#f3f4f6}
.panel{display:none}
.panel.active{display:block}
.panel-title{font-size:20px;font-weight:600;margin-bottom:20px;color:#1f2937;display:flex;align-items:center;gap:10px}
.panel-title i{color:#2563eb}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:8px;padding:16px;text-align:center;border:1px solid #e5e7eb}
.stat-card .num{font-size:28px;font-weight:700;color:#1f2937}
.stat-card .num.green{color:#16a34a}
.stat-card .num.yellow{color:#d97706}
.stat-card .num.red{color:#dc2626}
.stat-card .label{font-size:12px;color:#6b7280;margin-top:4px}
.section-head{font-size:14px;font-weight:600;color:#6b7280;margin:24px 0 12px;text-transform:uppercase;letter-spacing:.5px}
.console-wrap{background:#fff;border-radius:8px;padding:16px;border:1px solid #e5e7eb}
.task-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.task-card{background:#f9fafb;border-radius:6px;padding:12px;text-align:center;cursor:pointer;transition:background .12s;border:1px solid #e5e7eb}
.task-card:hover{background:#eff6ff}
.task-num{font-size:22px;font-weight:700}
.task-num.red{color:#dc2626}
.task-num.yellow{color:#d97706}
.task-num.green{color:#16a34a}
.task-num.gray{color:#9ca3af}
.task-label{font-size:12px;color:#6b7280;margin-top:2px}
.console-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.console-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#374151;font-size:13px;cursor:pointer;transition:background .12s}
.console-btn:hover{background:#f3f4f6}
.console-btn.primary{background:#2563eb;color:#fff;border-color:#2563eb}
.console-btn.primary:hover{background:#1d4ed8}
.console-log{background:#1e293b;border-radius:6px;padding:12px;font-family:monospace;font-size:12px;color:#e2e8f0;max-height:200px;overflow-y:auto;line-height:1.6}
.health-bar{display:flex;gap:16px;flex-wrap:wrap;font-size:13px}
.health-bar .ok{color:#16a34a}
.health-bar .warn{color:#d97706}
.pred-strip{display:flex;flex-direction:column;gap:6px}
.pred-item{display:flex;align-items:center;gap:12px;background:#fff;padding:8px 12px;border-radius:6px;border:1px solid #e5e7eb;font-size:14px}
.pred-item .teams{flex:1;font-weight:500}
.dir-badge{font-size:12px;padding:2px 8px;border-radius:4px;font-weight:600}
.dir-badge.A{background:#dcfce7;color:#16a34a}
.dir-badge.B{background:#fef3c7;color:#d97706}
.dir-badge.C{background:#fee2e2;color:#dc2626}
.pred-item .fit{font-size:12px;color:#6b7280}
.chart-wrap{background:#fff;border-radius:8px;padding:16px;border:1px solid #e5e7eb;margin-top:12px}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input{flex:1;min-width:200px;padding:8px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px}
.toolbar input:focus{outline:none;border-color:#2563eb}
.pill{padding:6px 14px;border-radius:20px;border:1px solid #d1d5db;background:#fff;color:#6b7280;font-size:13px;cursor:pointer;transition:all .12s}
.pill.on,.pill:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.match-group{margin-bottom:8px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
.group-header{padding:10px 14px;background:#f9fafb;font-weight:600;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.group-header .arrow{transition:transform .2s}
.group-header.open .arrow{transform:rotate(90deg)}
.group-header .count{font-weight:400;color:#9ca3af;font-size:12px;margin-left:auto}
.group-body{display:none}
.group-body.open{display:block}
.group-body table{width:100%;border-collapse:collapse;font-size:13px}
.group-body th{background:#f9fafb;padding:8px 12px;text-align:left;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb}
.group-body td{padding:8px 12px;border-bottom:1px solid #f3f4f6}
.group-body tr.row-done td:first-child{border-left:3px solid #16a34a}
.group-body tr.row-pred td:first-child{border-left:3px solid #d97706}
.group-body tr.row-wait td:first-child{border-left:3px solid #9ca3af}
.pred-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.pred-card{background:#fff;border-radius:8px;padding:16px;border:1px solid #e5e7eb}
.pred-card .pc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pred-card .pc-teams{font-size:15px;font-weight:600}
.pred-card .pc-bars{margin-top:8px}
.bar-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
.bar-row .bar-label{width:36px;color:#6b7280}
.bar-row .bar-track{flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden}
.bar-row .bar-fill{height:100%;border-radius:3px;transition:width .3s}
.plan-content{display:flex;flex-direction:column;gap:16px}
.rv-header{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.rv-stat{text-align:center}
.rv-stat .rv-num{font-size:32px;font-weight:700}
.rv-stat .rv-num.green{color:#16a34a}
.rv-stat .rv-label{font-size:12px;color:#6b7280}
.rv-list{display:flex;flex-direction:column;gap:8px}
.rv-item{background:#fff;padding:10px 14px;border-radius:6px;border:1px solid #e5e7eb;display:flex;align-items:center;gap:12px;font-size:14px}
.rv-item.hit{border-left:3px solid #16a34a}
.rv-item.miss{border-left:3px solid #dc2626}
.rv-item .rv-teams{flex:1}
.sys-status{background:#fff;border-radius:8px;padding:16px;border:1px solid #e5e7eb;font-size:14px}
.empty{text-align:center;padding:40px;color:#9ca3af}
#loadingOverlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.8);display:flex;align-items:center;justify-content:center;z-index:100;color:#fff;font-size:18px}
@media(max-width:768px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .task-cards{grid-template-columns:repeat(2,1fr)}
  main{padding:16px}
}
</style>
</head>
