// 渲染小组赛程
function renderCalendarView(){
  var main = document.querySelector(".main");
  main.scrollTop = 0;
  document.querySelector(".sec-header h2").textContent = "????";
  document.getElementById("todaySub").textContent = "72? ??? A-L?";
  document.getElementById("todayMatches").style.display = "block";
  document.getElementById("yesterdayContent").style.display = "none";

  // Build match lookup by date
  var matchByDate = {};
  for(var i = 0; i < WC_MATCHES.length; i++){
    var m = WC_MATCHES[i];
    if(!matchByDate[m.d]) matchByDate[m.d] = [];
    matchByDate[m.d].push(m);
  }

  var now = new Date();
  var y = now.getFullYear();
  var m = now.getMonth();
  var d = now.getDate();
  var todayKey = y + "-" + (m+1) + "-" + d;

  var calYear = 2026;
  var calMonth = 5; // June (0-indexed)

  function pad2(v){return v<10?"0"+v:""+v;}

  function buildHTML(year, month){
    var firstDay = new Date(year, month, 1);
    var startDow = firstDay.getDay();
    var startCol = startDow === 0 ? 6 : startDow - 1;
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

    var h = '<div class="wc-calendar-wrap">';

    // Toolbar
    h += '<div class="wc-cal-toolbar">';
    h += '<div class="calt-left">';
    h += '<div class="calt-month-nav">';
    h += '<button class="calt-nav-prev" onclick="prevMonth()">&lt;</button>';
    h += '<span class="calt-month-label">' + (month+1) + '? ' + year + '</span>';
    h += '<button class="calt-nav-next" onclick="nextMonth()">&gt;</button>';
    h += '</div>';
    h += '<span class="calt-stats">' + WC_MATCHES.length + '???</span>';
    h += '</div>';
    h += '<div class="calt-right">';
    h += '<button class="calt-today-btn" onclick="scrollToToday()">\uD83D\uDCCC ??</button>';
    h += '</div>';
    h += '</div>';

    // Grid
    h += '<div class="wc-cal-grid">';
    for(var dw = 0; dw < 7; dw++){
      h += '<div class="wc-cal-day-head">' + dayNames[dw] + '</div>';
    }

    // Empty cells before first day
    for(var e = 0; e < startCol; e++){
      h += '<div class="wc-cal-day other-month"></div>';
    }

    // Day cells
    for(var day = 1; day <= daysInMonth; day++){
      var dateKey = (month+1) + "\u6708" + day + "\u65e5";
      var matches = matchByDate[dateKey] || [];
      var isToday = (year + "-" + pad2(month+1) + "-" + pad2(day) === todayKey);
      var hasMatches = matches.length > 0;

      var cls = "wc-cal-day";
      if(hasMatches) cls += " has-matches";
      if(isToday) cls += " today";

      h += '<div class="' + cls + '" onclick="showDayPopup(' + day + ', event)" data-day="' + day + '">';
      h += '<div class="cday-num">' + day + '</div>';

      if(hasMatches){
        var groups = {};
        for(var mi = 0; mi < matches.length; mi++) groups[matches[mi].g] = true;
        var gkeys = Object.keys(groups);
        h += '<div class="cday-badges">';
        for(var gi = 0; gi < Math.min(gkeys.length, 4); gi++){
          h += '<span class="cday-badge">' + gkeys[gi] + '\u7ec4</span>';
        }
        if(gkeys.length > 4) h += '<span class="cday-badge">+' + (gkeys.length-4) + '</span>';
        h += '</div>';

        var showCount = matches.length <= 3 ? matches.length : 2;
        for(var mi = 0; mi < showCount; mi++){
          var mt = matches[mi];
          h += '<div class="cday-match"><span class="cdm-time">' + mt.t.slice(0,5) + '</span>' + mt.h.slice(0,4) + ' vs ' + mt.a.slice(0,4) + '</div>';
        }
        if(matches.length > 3){
          h += '<div class="cday-more">+' + (matches.length - 2) + ' \u573a</div>';
        }
      }

      h += '</div>';
    }

    // Remaining empty cells
    var totalCells = startCol + daysInMonth;
    var rem = (7 - totalCells % 7) % 7;
    for(var r = 0; r < rem; r++){
      h += '<div class="wc-cal-day other-month"></div>';
    }

    h += '</div></div>';
    return h;
  }

  document.getElementById("todayMatches").innerHTML = buildHTML(calYear, calMonth);
  window.__CAL_YEAR = calYear;
  window.__CAL_MONTH = calMonth;
}

// Month navigation
function prevMonth(){
  var y = window.__CAL_YEAR || 2026;
  var m = window.__CAL_MONTH || 5;
  // Only June 2026 for now
}

function nextMonth(){
  var y = window.__CAL_YEAR || 2026;
  var m = window.__CAL_MONTH || 5;
}

// Scroll to today
function scrollToToday(){
  var el = document.querySelector(".wc-cal-day.today");
  if(el) setTimeout(function(){ el.scrollIntoView({behavior:"smooth",block:"center"}); }, 50);
}

// Show popup
function showDayPopup(day, event){
  var existing = document.querySelector(".wc-cal-popup");
  if(existing) existing.remove();

  var dateKey = "6\u6708" + day + "\u65e5";
  var matches = [];
  for(var i = 0; i < WC_MATCHES.length; i++){
    if(WC_MATCHES[i].d === dateKey) matches.push(WC_MATCHES[i]);
  }
  if(matches.length === 0) return;

  var popup = document.createElement("div");
  popup.className = "wc-cal-popup show";
  popup.innerHTML = '<div class="pop-title">6\u6708' + day + '\u65e5 \u8d5b\u7a0b (' + matches.length + '\u573a)</div>';
  for(var i = 0; i < matches.length; i++){
    var m = matches[i];
    popup.innerHTML += '<div class="pop-match" onclick="this.closest('.wc-cal-popup').remove()">' +
      '<span class="pm-time">' + m.t.slice(0,5) + '</span>' +
      '<span class="pm-group">' + m.g + '\u7ec4</span>' +
      '<span class="pm-teams">' + m.h + ' vs ' + m.a + '</span>' +
      '<span class="pm-venue">' + m.v + '</span>' +
      '</div>';
  }

  document.body.appendChild(popup);

  var x = Math.min(event.clientX, window.innerWidth - 340);
  var y = Math.min(event.clientY, window.innerHeight - 400);
  if(x < 10) x = 10;
  if(y < 10) y = 10;
  popup.style.left = x + "px";
  popup.style.top = y + "px";
}

// Close popup on click outside
document.addEventListener("click", function(e){
  if(!e.target.closest(".wc-cal-popup") && !e.target.closest(".wc-cal-day")){
    var p = document.querySelector(".wc-cal-popup.show");
    if(p) p.remove();
  }
});
